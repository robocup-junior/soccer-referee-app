name: Release

on:
  push:
    branches: [main]

jobs:
  # ── 1. Determine version ─────────────────────────────────────────
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.extract.outputs.version_name }}
      version_code: ${{ steps.extract.outputs.version_code }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pubspec.yaml
        id: extract
        run: |
          # versionName is the part before '+', versionCode is the build number
          # after '+'. Deriving the code from pubspec (not github.run_number)
          # keeps it monotonic with the shipped Play release and deterministic
          # across re-runs. Bump the '+N' in pubspec.yaml to cut a new release.
          VERSION_LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=$(echo "$VERSION_LINE" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$VERSION_LINE" | cut -d'+' -f2)
          TAG="v${VERSION_NAME}"
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION_NAME}+${VERSION_CODE} → tag: ${TAG}"

      - name: Fail if tag already exists
        run: |
          # Guard only — does NOT create a tag. The tag is created by the final
          # github-release job, after a successful signed build, so a failed
          # build can never leave a dangling tag that blocks every re-run.
          if git rev-parse "${{ steps.extract.outputs.tag }}" >/dev/null 2>&1; then
            echo "ERROR: Tag ${{ steps.extract.outputs.tag }} already exists."
            echo "Bump the version in pubspec.yaml before merging to main."
            exit 1
          fi

  # ── 2. Build signed Android artifacts ───────────────────────────
  build-android:
    name: Build Android (signed)
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Setup Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/release.keystore
          cat > android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      - name: Install dependencies
        run: flutter pub get

      # versionName/versionCode come straight from pubspec.yaml (version: x.y.z+N),
      # so no pubspec rewrite is needed here.
      - name: Build signed APK
        run: flutter build apk --release

      - name: Build signed AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # ── 3. Create GitHub Release (also creates the tag) ──────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build-android]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: artifacts/

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "CHANGES<<EOF" >> $GITHUB_ENV
          echo "$CHANGES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        # action-gh-release creates the tag from tag_name at this commit if it
        # does not yet exist — so the tag only appears once artifacts are built.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body: |
            ## What's Changed
            ${{ env.CHANGES }}

            ---
            **Build:** `${{ needs.version.outputs.version_name }}+${{ needs.version.outputs.version_code }}`
          files: artifacts/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
